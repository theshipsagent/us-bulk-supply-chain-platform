## SESCO context
sesco:
  company: "SESCO Cement Corporation"
  parent: "SESCO Group (Egypt)"
  brands:
    - "Royal El Minya White Cement (Egypt)"
    - "Cleopatra Cement (Egypt)"
  partners:
    - "Nuh Cement (Turkey) - gray cement"
  terminals:
    houston:
      description: "World's largest privately owned single-user cement terminal"
      acreage: 22
      storage_capacity_tons: 150000
      expansion_target_year: 2025
      lat: 29.7355
      lon: -95.2615
  import_origins:
    - country: "Egypt"
      tariff_rate_pct: 10
      products: ["white Portland cement", "clinker"]
    - country: "Turkey"
      tariff_rate_pct: 10
      products: ["gray Portland cement"]

## Toolset dependencies
toolsets:
  barge_cost_model:
    use: "cement-specific barge route costing"
    config:
      commodity: "cement"
      handling: "pneumatic"
      discharge_rate_tph: 400
  rail_cost_model:
    use: "cement rail distribution costing"
    config:
      stcc: "3241"
      car_type: "covered_hopper"
      tons_per_car: 100
  port_cost_model:
    use: "port proforma for cement vessels"
    config:
      cargo_type: "cement_pneumatic"
      typical_vessel: "supramax"
  facility_registry:
    use: "EPA FRS cement plant/terminal locations"
    config:
      naics_filter: ["327310", "327320"]
  vessel_intelligence:
    use: "Panjiva cement import tracking"
    config:
      hts_filter: ["2523"]
  policy_analysis:
    use: "Section 301, tariff impact on cement imports"
    config:
      vessel_types: ["bulk", "general_cargo"]

## Report generation
reports:
  commodity_report:
    path: "04_REPORTS/cement_commodity_report/"
    chapters: 11  # 00 (exec summary) + 01-10
    format: ["markdown", "docx"]
  executive_briefing:
    path: "03_COMMODITY_MODULES/cement/reports/published/"
    format: ["markdown", "pdf"]
