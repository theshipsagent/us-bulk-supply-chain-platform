## Cement Commodity Module Configuration
## US Bulk Supply Chain Reporting Platform v1.0.0

module:
  name: "Cement & Cementitious Materials"
  version: "1.0.0"
  status: "active"

## NAICS codes for EPA FRS facility queries
naics_codes:
  primary:
    - "327310"   # Cement Manufacturing
    - "327320"   # Ready-Mix Concrete Manufacturing
  secondary:
    - "327331"   # Concrete Block and Brick Manufacturing
    - "327332"   # Concrete Pipe Manufacturing
    - "327390"   # Other Concrete Product Manufacturing
    - "327410"   # Lime Manufacturing
  scm_sources:
    - "221112"   # Fossil Fuel Electric Power Generation (fly ash)
    - "331110"   # Iron and Steel Mills (slag)
    - "212312"   # Crushed Stone Mining (limestone)
    - "212319"   # Other Crushed and Broken Stone Mining (pozzolans)

## HTS codes for Panjiva/trade flow analysis
hts_codes:
  portland_cement:
    "2523.10": "Cement clinkers"
    "2523.21": "White Portland cement"
    "2523.29": "Other Portland cement"
    "2523.30": "Aluminous cement"
    "2523.90": "Other hydraulic cements"
  scm_trade:
    "2618.00": "Granulated slag from iron/steel"
    "2619.00": "Slag, dross (non-granulated)"
    "2621.00": "Slag wool, rock wool"

## STCC codes for rail waybill analysis
stcc_codes:
  cement: "3241"
  concrete_products: "3273"
  lime: "3274"
  slag: "3312"

## Key market parameters (2024-2025 estimates)
market:
  us_production_mtpa: 100
  us_consumption_mtpa: 110
  us_import_mtpa: 15
  us_export_mtpa: 2
  avg_plant_price_per_ton: 150
  capacity_utilization_pct: 88
  num_plants: 98
  num_import_terminals: 25

