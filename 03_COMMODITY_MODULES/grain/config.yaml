# ============================================================
# API CONFIGURATION
# ============================================================
apis:
  fas_opendata:
    base_url: "https://apps.fas.usda.gov/OpenData/api/"
    auth_required: false
    rate_limit: null
    swagger_ui: "https://apps.fas.usda.gov/opendata/swagger/ui/index"
    endpoints:
      esr_exports_all: "esr/exports/commodityCode/{code}/allCountries/marketYear/{year}"
      esr_exports_country: "esr/exports/commodityCode/{code}/countryCode/{cc}/marketYear/{year}"
      esr_commodities: "esr/commodities"
      esr_countries: "esr/countries"
      psd_all_countries: "psd/commodity/{code}/country/all/year/{year}"
      psd_commodities: "psd/commodities"
      psd_countries: "psd/countries"

  nass_quickstats:
    base_url: "https://quickstats.nass.usda.gov/api/"
    auth_required: true
    key_env_var: "USDA_API_KEY"
    key_signup: "https://api.data.gov/signup/"
    record_limit: 50000
    endpoints:
      query: "api_GET/"
      counts: "get_counts/"
    key_stat_categories:
      - "PRODUCTION"
      - "YIELD"
      - "AREA PLANTED"
      - "AREA HARVESTED"
      - "STOCKS"
      - "PRICE RECEIVED"

  census_trade:
    base_url: "https://api.census.gov/data/timeseries/intltrade/"
    auth_required: true
    key_env_var: "CENSUS_API_KEY"
    key_signup: "https://api.census.gov/data/key_signup.html"
    endpoints:
      exports_hs: "exports/hs"
      exports_porths: "exports/porths"
      exports_statehs: "exports/statehs"
      imports_hs: "imports/hs"
    notes: "Use time=YYYY-MM format; E_COMMODITY param for HS code"

  gain_api:
    base_url: "https://apps.fas.usda.gov/newgainapi/api/"
    auth_required: false
    endpoints:
      by_product_codes: "Report/ReportsByProductCodes"
      by_search: "Report/ReportsBySearchCriteria"
    product_codes: ["CORN", "SOYBEANS", "WHEAT", "RICE", "SORGHUM"]

  ams_market_news:
    base_url: "https://mymarketnews.ams.usda.gov/api/public/v1/"
    auth_required: false

  eia_api:
    base_url: "https://api.eia.gov/v2/"
    auth_required: true
    key_env_var: "EIA_API_KEY"
    key_signup: "https://www.eia.gov/opendata/"
    relevant_series:
      ethanol_production: "petroleum/sum/sndsum/weekly"
      corn_for_ethanol: "use ERS Feed Grains Database"

