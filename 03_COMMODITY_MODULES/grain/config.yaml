# Grain Commodity Module Configuration
# Module: grain | Version: 1.0.0 | Last Updated: 2026-03-02
# Owner: William S. Davis III

module:
  name: grain
  version: "1.0.0"
  status: active
  description: "U.S. bulk grain and oilseed export supply chain intelligence"
