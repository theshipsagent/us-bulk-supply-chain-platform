# ============================================================
# WATERWAY INFRASTRUCTURE
# ============================================================
waterways:
  umr_iww:
    name: "Upper Mississippi River - Illinois Waterway"
    abbreviation: "UMR-IWW"
    importance: "Primary corn/soy export corridor to Gulf"
    grain_share_of_total_tonnage: 0.50
    key_locks:
      - "Lock 25, Winfield MO (600-ft chamber)"
      - "Lock 26, Alton IL (1200-ft modern)"
      - "LaGrange Lock, IL (600-ft, bottleneck)"
    standard_lock_chamber_ft: 600
    target_extension_ft: 1200
    typical_tow_length_ft: 1100
    standard_barge_capacity_bu: 52500
    standard_tow_barges: 15
    bottleneck_note: "600-ft chambers require tow breakup — doubles transit time to ~90 min"

  lower_mississippi:
    name: "Lower Mississippi River (Cairo IL to Gulf)"
    importance: "Final leg to Gulf export elevator complex"
    corn_barge_share_gulf_bound: 0.90

  columbia_snake_river:
    name: "Columbia-Snake River System"
    abbreviation: "CSR"
    importance: "Primary wheat and corn/soy PNW export corridor"
    pnw_wheat_via_snake_pct: 0.13
    key_locks:
      - "Ice Harbor Dam, WA"
      - "Lower Monumental Dam, WA"
      - "Little Goose Dam, WA"
      - "Lower Granite Dam, WA"
      - "McNary Dam, WA/OR"
      - "John Day Dam, WA/OR"
      - "The Dalles Dam, WA/OR"
      - "Bonneville Dam, WA/OR"
    pnw_ocean_ports: ["Kalama WA", "Portland OR", "Vancouver WA", "Longview WA"]

  ohio_river:
    name: "Ohio River System"
    importance: "Secondary soy/corn corridor to Lower Mississippi"

# ============================================================
# MODAL BENCHMARKS (USDA published)
# ============================================================
modal_benchmarks:
  source: "USDA AMS, Transportation of U.S. Grains: A Modal Share Analysis 1978-2014, Oct 2017"
  domestic_market_share_2014:
    truck: 0.53
    rail: 0.28
    barge: 0.19
  export_market_share_2014:
    truck: 0.07
    rail: 0.38
    barge: 0.55
  truck_rail_crossover_miles: 250
  rail_barge_crossover_miles: 700
  corn_gulf_barge_share: 0.90

  rail_shuttle_benchmarks:
    source: "Prater & Sparger, USDA AMS, Dec 2013"
    shuttle_threshold_cars: 75
    unit_train_cars: 52
    shuttle_train_cars: 110
    covered_hopper_weight_lbs: 286000
    jumbo_hopper_weight_lbs: 315000
    grain_rail_revenue_share_2009: 0.084
    grain_rail_tonnage_share_2009: 0.079
    grain_rail_share_all_us_grain_2007: 0.33

# ============================================================
# OUTPUT CONFIGURATION
# ============================================================
output:
  base_dir: "data/processed"
  subdirs:
    supply: "data/processed/supply"
    trade: "data/processed/trade"
    freight: "data/processed/freight"
    prices: "data/processed/prices"
    reference: "data/processed/reference"
  format: "parquet"
  raw_dir: "data/raw"

# ============================================================
# TOOLSET INTEGRATION
# ============================================================
toolset_integration:
  barge_cost_model:
    path: "../../02_TOOLSETS/barge_cost_model"
    grain_naics_for_routing: ["115114", "424510", "493130"]
    usace_grain_codes: ["14", "15", "17"]
    primary_corridor: "Illinois River → Lower Mississippi → New Orleans"

  rail_cost_model:
    path: "../../02_TOOLSETS/rail_cost_model"
    grain_stcc_codes: ["01112", "01130", "01131", "01141", "01155"]
    shuttle_threshold_cars: 75
    key_railroads: ["BNSF", "UP", "CN", "CP", "CSX", "NS"]

  vessel_voyage_analysis:
    path: "../../02_TOOLSETS/vessel_voyage_analysis"
    fgis_integration: true
    bulk_vessel_types: ["Panamax", "Supramax", "Handymax", "Handysize"]

  vessel_intelligence:
    path: "../../02_TOOLSETS/vessel_intelligence"
    grain_hs_chapters: ["1001", "1003", "1004", "1005", "1006", "1007",
                        "1201", "1507", "2302", "2303", "2304"]

  facility_registry:
    path: "../../02_TOOLSETS/facility_registry"
    grain_naics_codes:
      - "115114"   # Postharvest crop activities (country elevators)
      - "493130"   # Farm product warehousing (terminal elevators)
      - "424510"   # Grain merchant wholesalers
      - "311211"   # Flour milling
      - "311212"   # Rice milling
      - "311221"   # Wet corn milling (ethanol plants)
      - "311224"   # Soybean/oilseed processing
      - "311225"   # Fats/oils refining

  census_trade:
    path: "../../02_TOOLSETS/census_trade"
    grain_hs_chapters: ["1001", "1003", "1004", "1005", "1006", "1007",
                        "1201", "1507", "2302", "2303", "2304"]

  port_cost_model:
    path: "../../02_TOOLSETS/port_cost_model"
    grain_terminal_ports:
      - "New Orleans/South Louisiana"
      - "Portland OR"
      - "Kalama WA"
      - "Duluth-Superior MN/WI"
