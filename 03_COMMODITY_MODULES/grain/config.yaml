    note: "Largest U.S. grain export complex; ~60% of all corn/soy exports"

  gulf_texas:
    name: "Texas Gulf (Houston/Beaumont/Corpus Christi/Port Arthur)"
    census_district_code: "53"
    commodities: [WHEAT, SORGHUM, CORN]
    note: "Primary sorghum export point; HRW wheat from Plains"

  pnw_portland:
    name: "Portland, OR"
    census_district_code: "36"
    waterway: "Columbia River"
    commodities: [WHEAT, CORN, SOYBEANS, BARLEY]

  pnw_vancouver:
    name: "Vancouver, WA"
    census_district_code: "36"
