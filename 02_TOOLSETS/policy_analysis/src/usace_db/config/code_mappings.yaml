# ============================================================
# Service Type - Operator Service Classification
# ============================================================
service_types:
  1:
    service_name: "ICC-Regulated Common Carrier"
    description: "Carriage performed for compensation that is regulated by the Interstate Commerce Commission (ICC)"
    is_for_hire: true
    regulatory_status: "Regulated"
  2:
    service_name: "ICC-Exempt For-Hire Carrier"
    description: "Carriage performed for compensation, but exempt from regulation by the ICC"
    is_for_hire: true
    regulatory_status: "Exempt"
  3:
    service_name: "Private Carrier"
    description: "Carriage performed by a private entity where the vessel and the goods being transported are owned by the same entity"
    is_for_hire: false
    regulatory_status: "Private"

