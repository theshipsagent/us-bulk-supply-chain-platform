version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: barge_postgres
    environment:
      POSTGRES_DB: barge_forecasting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - barge_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barge_api
    environment:
      APP_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: barge_forecasting
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./forecasting:/app/forecasting
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - barge_network
    restart: unless-stopped

  # Streamlit Dashboard
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile.dashboard
    container_name: barge_dashboard
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - ../forecasting:/app/forecasting
    depends_on:
      - api
    networks:
      - barge_network
    restart: unless-stopped

  # Redis (for caching and rate limiting)
  redis:
    image: redis:7-alpine
    container_name: barge_redis
    ports:
      - "6379:6379"
    networks:
      - barge_network
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: barge_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - dashboard
    networks:
      - barge_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  barge_network:
    driver: bridge
