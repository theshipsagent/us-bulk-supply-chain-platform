# USAGE NOTES

## Query NAICS by Commodity

```python
import yaml

with open('naics_master.yaml') as f:
    naics = yaml.safe_load(f)

# Get all NAICS codes for cement
cement_naics = [
    code for code, data in naics.items()
    if any(c['commodity'] == 'cement' for c in data.get('commodities', []))
]
# Returns: ['327310', '327320', '327331', '327332', '327390', ...]
```

## Query Commodities by Relationship

```python
# Get all fly ash sources
fly_ash_sources = [
    code for code, data in naics.items()
    if any(c['commodity'] == 'fly_ash' and 'source' in c['relationship']
           for c in data.get('commodities', []))
]
# Returns: ['221112'] (coal power plants)
```

