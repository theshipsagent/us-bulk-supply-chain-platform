# TRADE FLOW ANALYSIS INTEGRATION

This HTS master taxonomy integrates with:
- **Panjiva import manifests** (800K+ records) in `01_DATA_SOURCES/federal_trade/panjiva_imports/`
- **USGS Mineral Commodity Summaries** for trade volume validation
- **SESCO import data** for white cement and Turkey/Egypt sourcing

Query Panjiva by HTS code:
```python
from report_platform.toolsets import ocean_vessel

# Get all cement imports from Turkey
imports = ocean_vessel.query_manifests(
    hts_code='2523.29.00',
    origin_country='Turkey',
    date_range=('2024-01-01', '2025-12-31')
)
```

