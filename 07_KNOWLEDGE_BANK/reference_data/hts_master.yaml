# USAGE NOTES

## Query HTS by Commodity

```python
import yaml

with open('hts_master.yaml') as f:
    hts = yaml.safe_load(f)

# Get all HTS codes for cement
cement_hts = [
    code for code, data in hts.items()
    if 'commodities' in data and
    any(c['commodity'] == 'cement' for c in data['commodities'])
]
# Returns: ['2523.10.00', '2523.21.00', '2523.29.00', '2523.30.00', '2523.90.00']
```

## Query by Tariff Rate

```python
# Get all duty-free imports
duty_free = [
    code for code, data in hts.items()
    if data.get('general_duty') == 'Free'
]
# Most cement/SCM products are duty-free
```

## Query by Origin Country

```python
# Get all HTS codes with Japan as major origin
japan_exports = [
    code for code, data in hts.items()
    if 'major_origins' in data and
    any(o['country'] == 'Japan' for o in data['major_origins'])
]
# Returns: ['2618.00.00'] (GGBFS)
```

